# AutoFyn configuration
# Copy to ~/.autofyn/config.yml (global) or .autofyn/config.yml (per-project)
# Per-project config takes precedence over global config.

database:
  host: db
  port: 5432
  name: autofyn
  user: autofyn
  password: autofyn # default for local dev — override via DB_PASSWORD env var in production
  pool_size: 5
  max_overflow: 10
  pool_timeout: 30
  pool_recycle: 1800
  echo: false

sandbox:
  url: http://sandbox:8080
  max_vms: 10
  vm_memory_mb: 512
  vm_vcpus: 1
  vm_timeout_sec: 300
  exec_timeout_sec: 120
  clone_timeout_sec: 300
  npm_timeout_sec: 300
  session_start_timeout_sec: 30
  health_timeout_sec: 5
  max_concurrent_sessions: 5
  session_event_queue_size: 1000
  log_level: info
  allow_docker: false  # mount Docker socket into sandbox (--allow-docker flag)
  retry_max_attempts: 3
  retry_base_delay_sec: 2.0
  early_exit_threshold_min: 5.0

agent:
  port: 8500
  max_budget_usd: 0 # 0 = unlimited
  max_rounds: 128
  tool_call_timeout_sec: 3600
  session_idle_timeout_sec: 120
  subagent_idle_kill_sec: 600
  max_concurrent_runs: 5
  cost_per_input_token: 0.000015        # 15.0 / 1_000_000
  cost_per_output_token: 0.000075       # 75.0 / 1_000_000
  cost_per_cache_read_token: 0.0000015  # 1.50 / 1_000_000
  cost_per_cache_write_token: 0.00001875 # 18.75 / 1_000_000
  session_error_max_retries: 3
  session_error_base_backoff_sec: 2
  idle_nudge_max_attempts: 3
  pulse_check_interval_sec: 30

dashboard:
  api_port: 3401
  ui_port: 3400

security:
  credential_patterns:
    - '\.env($|\.|/)'
    - 'credentials'
    - '\.pem$'
    - '\.key$'
    - 'secret'
    - '\.token$'
    - 'id_rsa'
    - 'id_ed25519'
    - '\.gnupg'
    - '\.ssh/'
    - '\.npmrc$'
    - '\.pypirc$'
    - '\.docker/config\.json'
  secret_env_vars: 'GIT_TOKEN|ANTHROPIC_API_KEY|GH_TOKEN|CLAUDE_CODE_OAUTH_TOKEN|FGAT_GIT_TOKEN|AGENT_INTERNAL_SECRET|SANDBOX_INTERNAL_SECRET'
