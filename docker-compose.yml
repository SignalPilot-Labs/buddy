# AutoFyn — all containers
#
# Usage:
#   docker compose up --build -d

name: autofyn

services:
  db:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: autofyn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autofyn
      POSTGRES_USER: autofyn
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autofyn}
    volumes:
      - autofyn-db:/var/lib/postgresql/data
    networks:
      - autofyn-control
    healthcheck:
      test: pg_isready -U autofyn
      interval: 5s
      timeout: 3s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile.dashboard
    container_name: autofyn-dashboard
    restart: unless-stopped
    environment:
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:?AGENT_INTERNAL_SECRET must be set — run up.sh or define it in .env}
      HOST_IP: ${HOST_IP:-}
    ports:
      - "127.0.0.1:3400:3400"
      - "127.0.0.1:3401:3401"
    volumes:
      - autofyn-keys:/data
    networks:
      - autofyn-control
    depends_on:
      db:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: autofyn/Dockerfile.agent
    container_name: autofyn-agent
    restart: unless-stopped
    environment:
      GIT_TERMINAL_PROMPT: "0"
      AF_SANDBOX_URL: http://sandbox:8080
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:?AGENT_INTERNAL_SECRET must be set — run up.sh or define it in .env}
      AF_ALLOW_DOCKER: ${AF_ALLOW_DOCKER:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${AGENT_PORT:-8500}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - .:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Persistent round archive. Only the agent mounts this — pool
      # sandboxes never see it, so runs can't read each other's reports.
      # The Dockerfile pre-creates the dir as agentuser so Docker's
      # first-mount copy preserves non-root ownership.
      - autofyn-rounds:/home/agentuser/.autofyn/rounds
    working_dir: /workspace
    networks:
      - autofyn-control
      - autofyn-sandbox
    depends_on:
      dashboard:
        condition: service_started
      sandbox:
        condition: service_healthy

  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile.gvisor
    container_name: autofyn-sandbox
    restart: unless-stopped
    environment:
      GIT_TERMINAL_PROMPT: "0"
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:?AGENT_INTERNAL_SECRET must be set — run up.sh or define it in .env}
    depends_on:
      dashboard:
        condition: service_started
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - agent-repo:/home/agentuser/repo
      - claude-agent-sessions:/home/agentuser/.claude
    networks:
      - autofyn-sandbox
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  autofyn-db:
  autofyn-keys:
  claude-agent-sessions:
  agent-repo:
  autofyn-rounds:

networks:
  autofyn-control:
    name: autofyn-control
    internal: true
  autofyn-sandbox:
    name: autofyn-sandbox
