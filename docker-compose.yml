# AutoFyn — all containers
#
# Usage:
#   docker compose up --build -d              # macOS / no KVM (gVisor sandbox)
#   docker compose --profile firecracker up --build -d  # Linux with /dev/kvm

name: autofyn

services:
  db:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: autofyn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autofyn
      POSTGRES_USER: autofyn
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autofyn}
    volumes:
      - autofyn-db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U autofyn
      interval: 5s
      timeout: 3s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile.dashboard
    container_name: autofyn-dashboard
    restart: unless-stopped
    environment:
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:-}
      HOST_IP: ${HOST_IP:-}
    ports:
      - "3400:3400"
      - "3401:3401"
    volumes:
      - autofyn-keys:/data
    depends_on:
      db:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: autofyn/Dockerfile.agent
    container_name: autofyn-agent
    restart: unless-stopped
    environment:
      GIT_TERMINAL_PROMPT: "0"
      AF_SANDBOX_URL: http://sandbox:8080
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:-}
      AF_ALLOW_DOCKER: ${AF_ALLOW_DOCKER:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${AGENT_PORT:-8500}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - .:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
    working_dir: /workspace
    depends_on:
      dashboard:
        condition: service_started
      sandbox:
        condition: service_healthy

  # gVisor sandbox (default — works everywhere)
  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile.gvisor
    container_name: autofyn-sandbox
    restart: unless-stopped
    environment:
      GIT_TERMINAL_PROMPT: "0"
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:-}
    depends_on:
      dashboard:
        condition: service_started
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - agent-repo:/home/agentuser/repo
      - claude-agent-sessions:/home/agentuser/.claude
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # Firecracker sandbox (Linux with KVM only)
  sandbox-firecracker:
    build:
      context: .
      dockerfile: sandbox/Dockerfile.firecracker
    container_name: autofyn-sandbox-firecracker
    restart: unless-stopped
    devices:
      - "/dev/kvm:/dev/kvm"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - sandbox-overlays:/opt/autofyn/overlays
      - agent-repo:/home/agentuser/repo
      - claude-agent-sessions:/home/agentuser/.claude
    profiles: ["firecracker"]

volumes:
  autofyn-db:
  autofyn-keys:
  claude-agent-sessions:
  agent-repo:
  sandbox-overlays:
