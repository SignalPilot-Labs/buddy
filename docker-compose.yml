# AutoFyn — all containers
#
# Usage:
#   docker compose up --build -d
#
# Required secrets — these MUST be set before starting:
#   AGENT_INTERNAL_SECRET   — shared secret between dashboard and agent
#   SANDBOX_INTERNAL_SECRET — shared secret between agent and sandbox
#
# Use `autofyn start` (recommended) or generate manually:
#   export AGENT_INTERNAL_SECRET=$(openssl rand -hex 32)
#   export SANDBOX_INTERNAL_SECRET=$(openssl rand -hex 32)
#
# Containers will fail to start if these variables are unset.

name: autofyn

services:
  db:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: autofyn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autofyn
      POSTGRES_USER: autofyn
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autofyn}
    volumes:
      - autofyn-db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U autofyn
      interval: 2s
      timeout: 2s
      retries: 5

  dashboard:
    image: ghcr.io/signalpilot-labs/autofyn-dashboard:${AF_IMAGE_TAG}
    build:
      context: .
      dockerfile: dashboard/Dockerfile.dashboard
    container_name: autofyn-dashboard
    restart: unless-stopped
    environment:
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET}
      HOST_IP: ${HOST_IP:-}
    ports:
      - "3400:3400"
      - "3401:3401"
    volumes:
      - autofyn-keys:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3400/ || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  agent:
    image: ghcr.io/signalpilot-labs/autofyn-agent:${AF_IMAGE_TAG}
    build:
      context: .
      dockerfile: autofyn/Dockerfile.agent
    container_name: autofyn-agent
    restart: unless-stopped
    environment:
      GIT_TERMINAL_PROMPT: "0"
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET}
      SANDBOX_INTERNAL_SECRET: ${SANDBOX_INTERNAL_SECRET}
      AF_ALLOW_DOCKER: ${AF_ALLOW_DOCKER:-}
      AF_IMAGE_TAG: ${AF_IMAGE_TAG}
      CONNECTOR_SECRET: ${CONNECTOR_SECRET}
      CONNECTOR_URL: http://host.docker.internal:${CONNECTOR_PORT:-9400}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${AGENT_PORT:-8500}/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - .:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Persistent round archive. Only the agent mounts this — pool
      # sandboxes never see it, so runs can't read each other's reports.
      # The Dockerfile pre-creates the dir as agentuser so Docker's
      # first-mount copy preserves non-root ownership.
      - autofyn-rounds:/home/agentuser/.autofyn/rounds
    working_dir: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      dashboard:
        condition: service_healthy

  sandbox:
    image: ghcr.io/signalpilot-labs/autofyn-sandbox:${AF_IMAGE_TAG}
    build:
      context: .
      dockerfile: sandbox/Dockerfile.gvisor
    container_name: autofyn-sandbox
    restart: unless-stopped
    environment:
      GIT_TERMINAL_PROMPT: "0"
      SANDBOX_INTERNAL_SECRET: ${SANDBOX_INTERNAL_SECRET}
      AF_SANDBOX_PORT: ${AF_SANDBOX_PORT}
    depends_on:
      db:
        condition: service_healthy
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - agent-repo:/home/agentuser/repo
      - claude-agent-sessions:/home/agentuser/.claude
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${AF_SANDBOX_PORT}/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  autofyn-db:
  autofyn-keys:
  claude-agent-sessions:
  agent-repo:
  autofyn-rounds:
