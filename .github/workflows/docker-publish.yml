name: Build & Publish Docker Images

on:
  push:
    branches: [main, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/signalpilot-labs/autofyn

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: agent
            dockerfile: autofyn/Dockerfile.agent
          - service: sandbox
            dockerfile: sandbox/Dockerfile.gvisor
          - service: dashboard
            dockerfile: dashboard/Dockerfile.dashboard

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME}"
          IMAGE="${{ env.IMAGE_PREFIX }}-${{ matrix.service }}"
          TAGS="${IMAGE}:${SHA}"
          if [ "$BRANCH" = "production" ]; then
            TAGS="${TAGS},${IMAGE}:stable"
          elif [ "$BRANCH" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:nightly"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
