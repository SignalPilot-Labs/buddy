name: Build & Publish Docker Images

on:
  push:
    branches: [main, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/signalpilot-labs/autofyn

jobs:
  # Agent and sandbox: lightweight Python builds — QEMU handles arm64 fine
  build-light:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: agent
            dockerfile: autofyn/Dockerfile.agent
          - service: sandbox
            dockerfile: sandbox/Dockerfile.gvisor

    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME}"
          IMAGE="${{ env.IMAGE_PREFIX }}-${{ matrix.service }}"
          TAGS="${IMAGE}:${SHA}"
          if [ "$BRANCH" = "production" ]; then
            TAGS="${TAGS},${IMAGE}:stable"
          elif [ "$BRANCH" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:nightly"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Dashboard: heavy Next.js build — native runners per arch, then merge manifest
  build-dashboard:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64

    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push per-arch
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dashboard/Dockerfile.dashboard
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-dashboard:${{ github.sha }}-${{ matrix.suffix }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=dashboard-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=dashboard-${{ matrix.suffix }}

  # Merge per-arch dashboard images into a single multi-arch manifest
  dashboard-manifest:
    needs: build-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}-dashboard"
          SHA="${GITHUB_SHA}"
          TAGS="${SHA::7}"
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "production" ]; then
            TAGS="${TAGS} stable"
          elif [ "$BRANCH" = "main" ]; then
            TAGS="${TAGS} nightly"
          fi
          for TAG in ${TAGS}; do
            docker buildx imagetools create -t "${IMAGE}:${TAG}" \
              "${IMAGE}:${SHA}-amd64" \
              "${IMAGE}:${SHA}-arm64"
          done
