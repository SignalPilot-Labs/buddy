# SignalPilot — Security Testing Database Stack
# Creates two PostgreSQL instances:
#   1. enterprise-pg: OLTP database (mimics production PostgreSQL)
#   2. warehouse-pg:  Analytics warehouse (mimics Snowflake star-schema)
#
# Usage:
#   docker compose up -d
#   python generate_data.py          # fills both DBs with ~5GB fake data
#   docker compose down -v           # tear down + delete volumes

services:
  # ── Enterprise OLTP Database (PostgreSQL 17) ──────────────────────────────
  enterprise-pg:
    image: postgres:17
    container_name: sp-enterprise-pg
    environment:
      POSTGRES_USER: enterprise_admin
      POSTGRES_PASSWORD: Ent3rpr1se!S3cur3
      POSTGRES_DB: enterprise_prod
    ports:
      - "5601:5432"
    volumes:
      - enterprise-data:/var/lib/postgresql/data
      - ./init_enterprise.sql:/docker-entrypoint-initdb.d/01_schema.sql
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    shm_size: "1g"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise_admin -d enterprise_prod"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Analytics Warehouse (PostgreSQL 17 — Snowflake star-schema layout) ────
  warehouse-pg:
    image: postgres:17
    container_name: sp-warehouse-pg
    environment:
      POSTGRES_USER: warehouse_admin
      POSTGRES_PASSWORD: W4reh0use!An4lyt1cs
      POSTGRES_DB: analytics_warehouse
    ports:
      - "5602:5432"
    volumes:
      - warehouse-data:/var/lib/postgresql/data
      - ./init_warehouse.sql:/docker-entrypoint-initdb.d/01_schema.sql
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_wal_size=2GB"
    shm_size: "1g"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_admin -d analytics_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  enterprise-data:
  warehouse-data:
