services:
  postgres:
    image: postgres:17
    container_name: improve-pg
    restart: unless-stopped
    ports:
      - "5610:5432"
    environment:
      POSTGRES_USER: improve_admin
      POSTGRES_PASSWORD: Impr0ve!Aud1t
      POSTGRES_DB: improve_audit
    volumes:
      - improve-pg-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U improve_admin -d improve_audit"]
      interval: 5s
      timeout: 3s
      retries: 10
    shm_size: 256mb

  monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    container_name: improve-monitor
    restart: unless-stopped
    ports:
      - "3400:3400"
      - "3401:3401"
    environment:
      AUDIT_DB_URL: postgresql://improve_admin:Impr0ve!Aud1t@postgres:5432/improve_audit
      AGENT_API_URL: http://agent:8500
    depends_on:
      postgres:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: improve-agent
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      GIT_TERMINAL_PROMPT: "0"
      # Agent config
      AUDIT_DB_URL: postgresql://improve_admin:Impr0ve!Aud1t@postgres:5432/improve_audit
      SP_BENCHMARK_DIR: /bench
      SP_GATEWAY_URL: http://host.docker.internal:3300
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8500/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ../:/workspace:rw
      - ../research:/home/agentuser/research:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SP_BENCHMARK_DIR:-D:\signalpilot-bench}:/bench:rw
      # Persist Claude CLI auth state across restarts
      - claude-agent-sessions:/home/agentuser/.claude
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  improve-pg-data:
  claude-agent-sessions:
